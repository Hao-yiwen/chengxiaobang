name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve ripgrep runtime
        shell: bash
        run: |
          rg_path="$(node -e "import('@vscode/ripgrep').then(({ rgPath }) => process.stdout.write(rgPath))")"
          echo "CHENGXIAOBANG_RG_PATH=$rg_path" >> "$GITHUB_ENV"

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  verify-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve ripgrep runtime
        shell: bash
        run: |
          rg_path="$(node -e "import('@vscode/ripgrep').then(({ rgPath }) => process.stdout.write(rgPath))")"
          echo "CHENGXIAOBANG_RG_PATH=$rg_path" >> "$GITHUB_ENV"

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build
