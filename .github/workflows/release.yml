name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 tag，例如 v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate mac signing secrets
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_LINK_PART_1: ${{ secrets.CSC_LINK_PART_1 }}
          CSC_LINK_PART_2: ${{ secrets.CSC_LINK_PART_2 }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          missing=0
          if [ -z "$CSC_LINK" ] && { [ -z "$CSC_LINK_PART_1" ] || [ -z "$CSC_LINK_PART_2" ]; }; then
            echo "::error::CSC_LINK 未配置，且 CSC_LINK_PART_1/CSC_LINK_PART_2 不完整，无法进行 Developer ID 签名"
            missing=1
          fi
          if [ -z "$CSC_KEY_PASSWORD" ]; then
            echo "::error::CSC_KEY_PASSWORD 未配置，无法导入 Developer ID 证书"
            missing=1
          fi
          has_apple_id_credentials=0
          if [ -n "$APPLE_ID" ] && [ -n "$APPLE_APP_SPECIFIC_PASSWORD" ] && [ -n "$APPLE_TEAM_ID" ]; then
            has_apple_id_credentials=1
          fi
          has_api_key_credentials=0
          if [ -n "$APPLE_API_KEY" ] && [ -n "$APPLE_API_KEY_ID" ] && [ -n "$APPLE_API_ISSUER" ]; then
            has_api_key_credentials=1
          fi
          if [ "$has_apple_id_credentials" -eq 0 ] && [ "$has_api_key_credentials" -eq 0 ]; then
            echo "::error::未配置 Apple 公证凭据。请配置 APPLE_ID + APPLE_APP_SPECIFIC_PASSWORD + APPLE_TEAM_ID，或 APPLE_API_KEY + APPLE_API_KEY_ID + APPLE_API_ISSUER"
            missing=1
          fi
          exit "$missing"

      - name: Build mac distributables
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_LINK_PART_1: ${{ secrets.CSC_LINK_PART_1 }}
          CSC_LINK_PART_2: ${{ secrets.CSC_LINK_PART_2 }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          if [ -z "$CSC_LINK" ] && [ -n "$CSC_LINK_PART_1" ] && [ -n "$CSC_LINK_PART_2" ]; then
            printf "%s%s" "$CSC_LINK_PART_1" "$CSC_LINK_PART_2" | base64 --decode > "$certificate_path"
            chmod 600 "$certificate_path"
            export CSC_LINK="$certificate_path"
          elif [ -n "$CSC_LINK" ] && [ -f "$CSC_LINK" ]; then
            certificate_path="$CSC_LINK"
          elif [ -n "$CSC_LINK" ] && [[ "$CSC_LINK" != http* ]]; then
            printf "%s" "$CSC_LINK" | sed 's/^data:.*;base64,//' | base64 --decode > "$certificate_path"
            chmod 600 "$certificate_path"
            export CSC_LINK="$certificate_path"
          fi
          if [ ! -f "$certificate_path" ]; then
            echo "::error::无法解析 Developer ID 证书文件，DMG 容器签名无法继续"
            exit 1
          fi
          signing_keychain="$RUNNER_TEMP/chengxiaobang-signing.keychain-db"
          signing_keychain_password="$(uuidgen)"
          security create-keychain -p "$signing_keychain_password" "$signing_keychain"
          security set-keychain-settings -lut 21600 "$signing_keychain"
          security unlock-keychain -p "$signing_keychain_password" "$signing_keychain"
          existing_keychains=()
          while IFS= read -r keychain; do
            existing_keychains+=("${keychain//\"/}")
          done < <(security list-keychains -d user | sed 's/^[[:space:]]*//')
          security list-keychains -d user -s "$signing_keychain" "${existing_keychains[@]}"
          security import "$certificate_path" -k "$signing_keychain" -P "$CSC_KEY_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$signing_keychain_password" "$signing_keychain"
          export CSC_KEYCHAIN="$signing_keychain"
          unset CSC_LINK_PART_1 CSC_LINK_PART_2
          notary_submit_args=()
          if [ -n "$APPLE_API_KEY" ] && [ -n "$APPLE_API_KEY_ID" ] && [ -n "$APPLE_API_ISSUER" ]; then
            api_key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
            printf "%s" "$APPLE_API_KEY" > "$api_key_path"
            chmod 600 "$api_key_path"
            export APPLE_API_KEY="$api_key_path"
            notary_submit_args=(--key "$api_key_path" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER")
            unset APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID APPLE_KEYCHAIN APPLE_KEYCHAIN_PROFILE
          else
            xcrun notarytool store-credentials chengxiaobang-ci \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --validate
            export APPLE_KEYCHAIN_PROFILE=chengxiaobang-ci
            notary_submit_args=(--keychain-profile chengxiaobang-ci)
            unset APPLE_ID APPLE_APP_SPECIFIC_PASSWORD APPLE_TEAM_ID APPLE_API_KEY APPLE_API_KEY_ID APPLE_API_ISSUER
          fi
          pnpm run build
          pnpm --filter @chengxiaobang/desktop exec electron-builder --mac --publish never -c.npmRebuild=false -c.mac.forceCodeSigning=true
          dmg_path="$(find apps/desktop/out -maxdepth 1 -type f -name "*.dmg" ! -name "*.blockmap" | head -n 1)"
          if [ -z "$dmg_path" ]; then
            echo "::error::没有找到待签名公证的 DMG"
            find apps/desktop/out -type f || true
            exit 1
          fi
          signing_identity="Developer ID Application: yiwen hao (84F8R9TAQN)"
          codesign --force --sign "$signing_identity" --timestamp --keychain "$signing_keychain" "$dmg_path"
          xcrun notarytool submit "$dmg_path" "${notary_submit_args[@]}" --wait
          xcrun stapler staple "$dmg_path"
          xcrun stapler validate "$dmg_path"
          spctl --assess --type open --context context:primary-signature --verbose=4 "$dmg_path"
          app_builder_arch="amd64"
          if [ "$(uname -m)" = "arm64" ]; then
            app_builder_arch="arm64"
          fi
          app_builder="node_modules/.pnpm/app-builder-bin@4.0.0/node_modules/app-builder-bin/mac/app-builder_${app_builder_arch}"
          "$app_builder" blockmap --input "$dmg_path" --output "$dmg_path.blockmap"
          DMG_PATH="$dmg_path" node <<'NODE'
          const crypto = require("node:crypto");
          const fs = require("node:fs");
          const path = require("node:path");

          const dmgPath = process.env.DMG_PATH;
          const latestPath = "apps/desktop/out/latest-mac.yml";
          const dmgName = path.basename(dmgPath);
          const sha512 = crypto.createHash("sha512").update(fs.readFileSync(dmgPath)).digest("base64");
          const size = fs.statSync(dmgPath).size;
          const escapeRegExp = (value) => value.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          let latest = fs.readFileSync(latestPath, "utf8");
          const fileEntryPattern = new RegExp(
            `(  - url: ${escapeRegExp(dmgName)}\\n    sha512: )[^\\n]+(\\n    size: )\\d+`
          );
          if (!fileEntryPattern.test(latest)) {
            throw new Error(`latest-mac.yml 中没有找到 DMG 条目: ${dmgName}`);
          }
          latest = latest.replace(fileEntryPattern, `$1${sha512}$2${size}`);
          const topLevelPattern = new RegExp(`(path: ${escapeRegExp(dmgName)}\\nsha512: )[^\\n]+`);
          latest = latest.replace(topLevelPattern, `$1${sha512}`);
          fs.writeFileSync(latestPath, latest);
          console.log(`已更新 latest-mac.yml 中的 DMG sha512/size: ${dmgName}`);
          NODE

      - name: Verify mac artifacts
        shell: bash
        run: |
          if [ ! -d apps/desktop/out ]; then
            echo "::error::没有找到 electron-builder 输出目录 apps/desktop/out"
            exit 1
          fi
          installers=$(find apps/desktop/out -type f \( -name "*.dmg" -o -name "*.zip" \) ! -name "*.blockmap")
          blockmaps=$(find apps/desktop/out -type f -name "*.blockmap")
          metadata=$(find apps/desktop/out -type f -name "latest-mac.yml")
          if [ -z "$installers" ] || [ -z "$blockmaps" ] || [ -z "$metadata" ]; then
            echo "::error::没有找到完整 mac 自动更新产物（期望 .dmg/.zip、.blockmap 与 latest-mac.yml）"
            find apps/desktop/out -type f || true
            exit 1
          fi
          while IFS= read -r asset; do
            if [ ! -f "apps/desktop/out/$asset" ]; then
              echo "::error::latest-mac.yml 引用的资产不存在：$asset"
              find apps/desktop/out -type f || true
              exit 1
            fi
          done < <(sed -n 's/^path: //p' apps/desktop/out/latest-mac.yml)
          while IFS= read -r dmg; do
            hdiutil verify "$dmg"
            xcrun stapler validate "$dmg"
            spctl --assess --type open --context context:primary-signature --verbose=4 "$dmg"
          done < <(find apps/desktop/out -maxdepth 1 -type f -name "*.dmg" ! -name "*.blockmap")

      - name: Upload mac artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-artifacts
          path: |
            apps/desktop/out/*.dmg
            apps/desktop/out/*.zip
            apps/desktop/out/*.blockmap
            apps/desktop/out/latest-mac.yml
          if-no-files-found: error

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Windows distributables
        run: pnpm run build && pnpm --filter @chengxiaobang/desktop exec electron-builder --win --x64 --publish never "-c.npmRebuild=false"

      - name: Verify Windows artifacts and packaged resources
        shell: pwsh
        run: |
          $out = "apps/desktop/out"
          if (-not (Test-Path $out)) {
            throw "没有找到 electron-builder 输出目录 apps/desktop/out"
          }
          $installers = Get-ChildItem $out -Recurse -File -Filter "*.exe" | Where-Object { $_.Name -notlike "*.blockmap" }
          $blockmaps = Get-ChildItem $out -Recurse -File -Filter "*.blockmap"
          $metadata = Join-Path $out "latest.yml"
          if ($installers.Count -eq 0 -or $blockmaps.Count -eq 0 -or -not (Test-Path $metadata)) {
            Get-ChildItem $out -Recurse -File | Select-Object -ExpandProperty FullName
            throw "没有找到完整 Windows 产物（期望 .exe、.blockmap 与 latest.yml）"
          }
          $resources = Join-Path $out "win-unpacked/resources"
          $required = @(
            (Join-Path $resources "bun.exe"),
            (Join-Path $resources "backend/main.js"),
            (Join-Path $resources "ocr/pp-ocrv6-small/det.onnx"),
            (Join-Path $resources "ocr/pp-ocrv6-small/rec.onnx"),
            (Join-Path $resources "ocr/pp-ocrv6-small/dict.txt"),
            (Join-Path $resources "app.asar.unpacked/node_modules/node-pty"),
            (Join-Path $resources "app.asar.unpacked/node_modules/sharp"),
            (Join-Path $resources "app.asar.unpacked/node_modules/onnxruntime-node"),
            (Join-Path $resources "app.asar.unpacked/node_modules/@napi-rs/canvas")
          )
          foreach ($path in $required) {
            if (-not (Test-Path $path)) {
              throw "打包资源缺失: $path"
            }
          }
          $canvasPackage = Join-Path $resources "app.asar.unpacked/node_modules/@napi-rs/canvas"
          $canvasCandidates = @(
            (Join-Path $canvasPackage "skia.win32-x64-msvc.node"),
            (Join-Path $canvasPackage "skia.win32-x64-gnu.node"),
            (Join-Path $resources "app.asar.unpacked/node_modules/@napi-rs/canvas-win32-x64-msvc"),
            (Join-Path $resources "app.asar.unpacked/node_modules/@napi-rs/canvas-win32-x64-gnu")
          )
          $canvasNative = $canvasCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $canvasNative) {
            $canvasCandidates | ForEach-Object { Write-Host "检查 @napi-rs/canvas native 候选: $_" }
            throw "未找到 @napi-rs/canvas Windows x64 native 资源"
          }
          Write-Host "已找到 @napi-rs/canvas native 资源: $canvasNative"

      - name: Smoke packaged backend
        run: pnpm --filter @chengxiaobang/desktop run smoke:packaged-backend

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            apps/desktop/out/*.exe
            apps/desktop/out/*.blockmap
            apps/desktop/out/latest.yml
          if-no-files-found: error

  publish:
    runs-on: ubuntu-latest
    needs:
      - build-mac
      - build-windows
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-upload

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG 已存在，直接覆盖上传产物"
          else
            gh release create "$TAG" --title "程小帮 $TAG" --notes "程小帮 $TAG" --repo "$GITHUB_REPOSITORY"
          fi

          mapfile -d '' files < <(find dist-upload -type f -print0)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::没有找到待上传的 Release 产物"
            exit 1
          fi
          gh release upload "$TAG" "${files[@]}" --repo "$GITHUB_REPOSITORY" --clobber
