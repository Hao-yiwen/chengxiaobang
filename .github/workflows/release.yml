name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "要发布的 tag，例如 v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref }}

      - uses: pnpm/action-setup@v4
        with:
          version: 11.0.9
          run_install: false

      - uses: actions/setup-node@v5
        with:
          node-version: 24.15.0
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build mac distributables
        run: pnpm run build && pnpm --filter @chengxiaobang/desktop exec electron-builder --mac --publish never

      - name: Verify artifacts exist
        shell: bash
        run: |
          if [ ! -d apps/desktop/out ]; then
            echo "::error::没有找到 electron-builder 输出目录 apps/desktop/out"
            exit 1
          fi
          files=$(find apps/desktop/out -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.blockmap" -o -name "latest-mac.yml" \))
          installers=$(find apps/desktop/out -type f \( -name "*.dmg" -o -name "*.zip" \) ! -name "*.blockmap")
          blockmaps=$(find apps/desktop/out -type f -name "*.blockmap")
          metadata=$(find apps/desktop/out -type f -name "latest-mac.yml")
          if [ -z "$installers" ] || [ -z "$blockmaps" ] || [ -z "$metadata" ]; then
            echo "::error::没有找到完整自动更新产物（期望 .dmg/.zip、.blockmap 与 latest-mac.yml）"
            find apps/desktop/out -type f || true
            exit 1
          fi
          while IFS= read -r asset; do
            if [ ! -f "apps/desktop/out/$asset" ]; then
              echo "::error::latest-mac.yml 引用的资产不存在：$asset"
              find apps/desktop/out -type f || true
              exit 1
            fi
          done < <(sed -n 's/^path: //p' apps/desktop/out/latest-mac.yml)
          echo "$files"

      - name: Upload to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "Release $TAG 已存在，直接覆盖上传产物"
          else
            gh release create "$TAG" --title "程小帮 $TAG" --notes "程小帮 $TAG" --repo "$GITHUB_REPOSITORY"
          fi

          mkdir -p dist-upload
          while IFS= read -r -d '' file; do
            cp "$file" "dist-upload/$(basename "$file")"
          done < <(find apps/desktop/out -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.blockmap" -o -name "latest-mac.yml" \) -print0)

          gh release upload "$TAG" dist-upload/* --repo "$GITHUB_REPOSITORY" --clobber
